<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockFlow | Add Item</title>
  <style>
    :root{--bg:#f4f0e8;--ink:#18201c;--muted:#66736d;--card:#fffdf8;--line:#ddd5c8;--accent:#0f7a5f;--accent2:#f0a63a;--danger:#c8415a;--shadow:0 18px 48px rgba(38,32,22,.12);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink)}.nav{position:sticky;top:0;z-index:5;display:flex;justify-content:space-between;align-items:center;padding:16px 28px;background:rgba(255,253,248,.88);backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}.brand{display:flex;align-items:center;gap:12px}.logo{width:42px;height:42px;border-radius:14px;background:var(--accent);color:white;display:grid;place-items:center;font-weight:950}.links{display:flex;gap:8px;align-items:center}.links a,.links button{border:1px solid transparent;background:transparent;color:var(--muted);text-decoration:none;border-radius:14px;padding:10px 12px;font-weight:850;cursor:pointer}.links .active,.links a:hover,.links button:hover{background:#e8f5ef;color:var(--accent)}.main{padding:28px;max-width:1180px;margin:0 auto}.top{margin-bottom:18px}.top h1{font-size:38px;margin:0 0 8px}.top p{color:var(--muted);margin:0}.layout{display:grid;grid-template-columns:1fr 380px;gap:18px}.panel{border:1px solid var(--line);border-radius:28px;background:var(--card);box-shadow:var(--shadow);overflow:hidden}.steps{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--line)}.step{padding:18px;border-right:1px solid var(--line)}.step:last-child{border-right:0}.step span{display:block;color:var(--accent);font-size:12px;font-weight:950}.step b{display:block;margin-top:6px}.form{padding:24px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.field.full{grid-column:1/-1}label{display:block;font-size:13px;font-weight:850;margin-bottom:8px}input,select{width:100%;height:54px;border:1px solid var(--line);border-radius:16px;background:#fff;color:var(--ink);padding:0 14px;font-size:15px;outline:none}input:focus,select:focus{border-color:rgba(15,122,95,.6);box-shadow:0 0 0 4px rgba(15,122,95,.1)}.save{height:54px;border:0;border-radius:16px;background:var(--accent);color:#fff;font-weight:950;cursor:pointer}.preview{padding:22px;display:grid;gap:14px}.card{border:1px solid var(--line);border-radius:22px;background:#faf6ee;padding:18px}.card span{display:block;color:var(--muted);font-size:12px;font-weight:900;text-transform:uppercase}.card b{display:block;font-size:28px;margin-top:8px;color:var(--accent)}.bar{height:12px;border-radius:99px;background:#eadfce;overflow:hidden}.bar i{height:100%;display:block;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px}.suggest{display:flex;justify-content:space-between;align-items:center;gap:12px}.suggest button{border:1px solid #c8e3d9;background:#e8f5ef;color:var(--accent);border-radius:13px;padding:10px 12px;font-weight:900;cursor:pointer}.toast{position:fixed;right:20px;bottom:20px;background:#fff;border:1px solid var(--line);box-shadow:var(--shadow);border-radius:16px;padding:14px 16px;opacity:0;transform:translateY(12px);transition:.25s}.toast.show{opacity:1;transform:translateY(0)}
    @media(max-width:920px){.layout{grid-template-columns:1fr}.nav,.links{align-items:flex-start;flex-direction:column}}@media(max-width:620px){.main{padding:16px}.grid,.steps{grid-template-columns:1fr}.step{border-right:0;border-bottom:1px solid var(--line)}}
    :root{--bg:#07101d;--ink:#eef4ff;--muted:#90a3bf;--card:#101827;--line:#1f2d43;--accent:#20d6a3;--accent2:#5a8cff;--danger:#ff5c7a;--shadow:0 18px 60px rgba(0,0,0,.34)}
    body{background:radial-gradient(circle at 74% 0,rgba(90,140,255,.17),transparent 31%),linear-gradient(135deg,#07101d,#0b1020);color:var(--ink)}.nav{background:rgba(8,14,25,.9);border-bottom-color:var(--line)}.logo{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#031019}.links a,.links button{color:#bdcbe0}.links .active,.links a:hover,.links button:hover{background:#101827;color:var(--ink)}.panel,.card{background:linear-gradient(180deg,#111b2c,#0d1524);border-color:var(--line);box-shadow:var(--shadow)}.top p,.previewCat,.card p,.card span{color:var(--muted)}.step{border-color:var(--line)}.step span,.card b{color:var(--accent)}input,select{background:#0a111e;border-color:var(--line);color:var(--ink)}input:focus,select:focus{border-color:rgba(32,214,163,.7);box-shadow:0 0 0 4px rgba(32,214,163,.1)}.save{background:linear-gradient(135deg,var(--accent),#6ae6c4);color:#04120f}.bar{background:#0a111e}.bar i{background:linear-gradient(90deg,var(--accent),var(--accent2))}.suggest button{background:#0b1321;border-color:rgba(32,214,163,.35);color:#dffcf3}.toast{background:#101827;border-color:rgba(32,214,163,.35)}
  </style>
</head>
<body>
  <header class="nav"><div class="brand"><div class="logo">SF</div><b>StockFlow</b></div><nav class="links"><a href="dashboard.html">Dashboard</a><a href="inventory.html">Inventory</a><a class="active" href="add-item.html">Add Item</a><button id="logout">Logout</button></nav></header>
  <main class="main"><section class="top"><h1 id="title">Add inventory item</h1><p>New items start with zero weekly sales, then update as you record sales in Inventory.</p></section><section class="layout">
    <form class="panel" id="itemForm"><div class="steps"><div class="step"><span>01</span><b>Product</b></div><div class="step"><span>02</span><b>Pricing</b></div><div class="step"><span>03</span><b>Stock</b></div></div><div class="form"><div class="grid"><div class="field full"><label for="name">Item Name</label><input id="name" placeholder="Merino Crew Sweater" required></div><div class="field"><label for="category">Category</label><select id="category"><option>Apparel</option><option>Accessories</option><option>Home</option><option>Grocery</option><option>Electronics</option><option>Beauty</option></select></div><div class="field"><label for="qty">Quantity</label><input id="qty" type="number" min="0" step="1" required></div><div class="field"><label for="cost">Cost Price</label><input id="cost" type="number" min="0" step="0.01" required></div><div class="field"><label for="selling">Selling Price</label><input id="selling" type="number" min="0" step="0.01" required></div><div class="field" style="align-self:end"><button class="save" type="submit">Save item</button></div></div></div></form>
    <aside class="panel preview"><div class="card"><span>Product preview</span><b id="previewName">New item</b><p id="previewCat">Category</p></div><div class="card"><span>Profit per unit</span><b id="profit">₹0.00</b></div><div class="card"><span id="marginText">Margin 0%</span><div class="bar"><i id="bar"></i></div></div><div class="card suggest"><div><span>Suggested selling</span><b id="suggested">₹0.00</b></div><button type="button" id="applySuggested">Apply</button></div></aside>
  </section></main><div class="toast" id="toast">Item Added</div>
  <script>
    if(!localStorage.getItem("retailerName"))location.href="login.html";const $=id=>document.getElementById(id),money=n=>"₹"+Number(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});const API_BASE=location.protocol==="file:"?"http://127.0.0.1:3000":"";async function api(path,options={}){try{const res=await fetch(API_BASE+path,{headers:{"Content-Type":"application/json"},...options});if(!res.ok)throw new Error("API unavailable");return await res.json()}catch(e){return null}}$("title").textContent=(localStorage.getItem("retailerName")||"Retailer")+" add inventory item";
    const name=$("name"),cat=$("category"),qty=$("qty"),cost=$("cost"),selling=$("selling");function update(){const c=+cost.value||0,s=+selling.value||0,p=s-c,m=s?Math.max(0,Math.min(100,p/s*100)):0;$("previewName").textContent=name.value.trim()||"New item";$("previewCat").textContent=cat.value;$("profit").textContent=money(p);$("suggested").textContent=money(c*1.65);$("marginText").textContent="Margin "+Math.round(m)+"%";$("bar").style.width=m+"%";$("profit").style.color=p<0?"var(--danger)":"var(--accent)"}[name,cat,qty,cost,selling].forEach(el=>el.addEventListener("input",update));update();$("applySuggested").onclick=()=>{selling.value=((+cost.value||0)*1.65).toFixed(2);update()};
    $("itemForm").addEventListener("submit",async e=>{e.preventDefault();const items=JSON.parse(localStorage.getItem("inventoryItems")||"[]"),sales=JSON.parse(localStorage.getItem("weeklySales")||"{}"),id="itm-"+Date.now(),item={id,name:name.value.trim(),category:cat.value,qty:+qty.value,cost:+cost.value,selling:+selling.value};items.push(item);sales[id]=[0,0,0,0,0,0,0];localStorage.setItem("inventoryItems",JSON.stringify(items));localStorage.setItem("weeklySales",JSON.stringify(sales));await api("/api/items",{method:"POST",body:JSON.stringify(item)});$("toast").classList.add("show");setTimeout(()=>location.href="inventory.html",700)});$("logout").onclick=()=>{localStorage.removeItem("retailerName");location.href="login.html"};
  </script>
</body>
</html>
